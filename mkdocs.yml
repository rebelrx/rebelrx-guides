site_name: RebelRx Docs
site_description: Practical guides for Linux, self-hosting, privacy, and evidence-based health education
site_url: https://docs.rebelrx.tech
repo_url: https://github.com/rebelrx/rebelrx-guides
repo_name: rebelrx/rebelrx-guides
site_author: RebelRx
copyright: © 2026 RebelRx Group LLC. All rights reserved.

theme:
  name: material
  logo: assets/images/rebelrxlogo.jpg
  features:
    - navigation.instant
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md

  - Linux:
      - Overview: linux/index.md
      - Artix Desktop Install: linux/artix-kde-openrc-install.md
      - Devuan Server Install: linux/devuan-server-install.md

  - Homelab:
      - Overview: homelab/index.md
      - Docker Compose: homelab/docker-home-lab.md

  - Privacy:
      - Overview: privacy/index.md
      - Why Privacy Matters: privacy/why-privacy.md
      - Privacy-Based App Recommendations: privacy/app-recommendations.md
      - Migration Guide: privacy/migration.md
      - RebelRx Setup: privacy/my-setup.md

  - Health:
      - Overview: health/index.md
      - Non-Toxic Grocery Guide: health/non-toxic-grocery-guide.md
      - Medical Resources: health/medical-resources.md
      - Trusted Practitioners: health/practitioners.md

  - About: about.md
