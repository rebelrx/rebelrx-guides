site_name: RebelRx Docs
site_description: Practical guides for Linux, self-hosting, privacy, and evidence-based health education
site_url: https://docs.rebelrx.tech
repo_url: https://github.com/rebelrx
repo_name: rebelrx
site_author: RebelRx
copyright: © 2026 RebelRx Group LLC. All rights reserved.
docs_dir: docs
site_dir: site
theme:
  name: material
  language: en
  logo: assets/images/rebelrxlogo.jpg
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
extra:
  social:
    - icon: material/shield-check
      name: Privacy
      link: /privacy/
    - icon: fontawesome/brands/github
      link: https://github.com/rebelrx
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
        - locale: ru
          name: Русский
          build: true
        - locale: zh
          name: 中文
          build: true
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
nav:
  - Home: index.md
  - Linux:
      - Overview: linux/index.md
      - Why Linux: linux/why-linux.md
      - Artix Desktop Install: linux/artix-kde-openrc-install.md
      - Devuan Server Install: linux/devuan-server-install.md
  - Homelab:
      - Overview: homelab/index.md
      - Docker Compose: homelab/docker-home-lab.md
  - Privacy:
      - Overview: privacy/index.md
      - Why Privacy Matters: privacy/why-privacy.md
      - Privacy-Based App Recommendations: privacy/app-recommendations.md
      - Migration Guide: privacy/migration.md
      - RebelRx Setup: privacy/my-setup.md
  - Health:
      - Overview: health/index.md
      - Wake Up: health/wake-up.md
      - What You Can Do: health/what-you-can-do.md
      - Non-Toxic Grocery Guide:
          - Overview: health/non-toxic-grocery-guide/index.md
          - Quick Start: health/non-toxic-grocery-guide/quick-start.md
          - Shopping Framework: health/non-toxic-grocery-guide/shopping-framework.md
          - Produce: health/non-toxic-grocery-guide/produce.md
          - Protein: health/non-toxic-grocery-guide/protein.md
          - Fats & Oils: health/non-toxic-grocery-guide/fats-and-oils.md
          - Dairy: health/non-toxic-grocery-guide/dairy.md
          - Carbohydrates: health/non-toxic-grocery-guide/carbohydrates.md
          - Pantry Staples: health/non-toxic-grocery-guide/pantry-staples.md
          - Beverages: health/non-toxic-grocery-guide/beverages.md
          - Packaged Foods: health/non-toxic-grocery-guide/packaged-foods.md
          - Kitchen & Storage: health/non-toxic-grocery-guide/kitchen-and-storage.md
          - Water Filtration: health/non-toxic-grocery-guide/water-filtration.md
          - Full Guide: health/non-toxic-grocery-guide/full-guide.md
      - Medical Resources: health/medical-resources.md
      - Trusted Practitioners: health/practitioners.md
  - About: about.md
